## GPS postprocess config file - Enhanced v0.4.0
## Created Nov 2013, Enhanced for gps_parser v0.4.0 
## bgo - bgo@vedur.is
##
## Enhanced in v0.4.0 to support:
## - System tool paths for GPS processing tools
## - Default values for CLI applications  
## - Receiver and data path configuration
##
## Legacy sections maintained for backward compatibility:
## figDir:  the placement directory of figures, 
## prePath, rapPath, totPath: 
##        Defines the locations of time series data created by GLOBK
## fTypes: Format of graphics files created.

# ==============================================================================
# SYSTEM PATHS (v0.4.0)
# ==============================================================================

[PATHS]
# GPS processing tool paths
sbf2rin_path = /home/gpsops/bin/sbf2rin
teqc_path = /home/gpsops/bin/teqc
bin2asc_path = /opt/rxtools/bin/bin2asc

# Data directory paths
data_prepath = /data/
receiver_base_path = /DSK1/SSN/

# Tool directory paths (for PATH resolution)
rxtools_bin = /opt/rxtools/bin
gpsops_bin = /home/gpsops/bin

# ==============================================================================
# DEFAULT VALUES (v0.4.0) 
# ==============================================================================

[DEFAULTS]
# CLI default values for receivers package
default_days_back = 10
default_session = 15s_24hr
default_compression = .gz
default_end_offset_days = 1

# Health monitoring defaults
health_extraction_pattern = *.sbf*
health_output_formats = csv,jsonl

# FTP operation defaults
ftp_connection_retries = 3
ftp_transfer_timeout = 300

# ==============================================================================
# LEGACY CONFIGURATION (Maintained for backward compatibility)
# ==============================================================================

[Configs]
figDir  = /home/bgo/gamit-times/figures/
prePath = ~/verkefni/test/aqaba-reference_test/datfiles/pre
rapPath = ~/verkefni/test/aqaba-reference_test/datfiles/rap
#totPath = /home/bgo/gamit-times/TOT-okada
totPath = /mnt/gpsdata/
fTypes = eps,ppm
pfile = /mnt/gpsconfig/station-plate 
coordfile = /mnt/gpsconfig/station_coord.xyz

# ==============================================================================
# ADDITIONAL SECTIONS (v0.4.0)
# ==============================================================================

[FILES]
# Configuration file references (for backward compatibility)
# These may be used by legacy postprocess functions

# End of config
#EOC
